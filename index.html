<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refund Pro | Nerestore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --accent: #06b6d4;
            --bg: #05070a;
            --card-bg: rgba(17, 25, 40, 0.75);
            --border: rgba(255, 255, 255, 0.125);
            --text: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.15) 0px, transparent 50%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #a78bfa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .input-wrapper {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input[type="number"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Custom Slider Styling */
        .slider-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .slider-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .slider-info span:last-child {
            color: var(--accent);
            font-weight: 700;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--text);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
        }

        /* Result Section */
        .result-area {
            margin-top: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(6, 182, 212, 0.15));
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        #refundLabel {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        #totalRefund {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            color: #fff;
        }

        .copy-btn {
            margin-top: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        .copy-btn:hover {
            background: var(--primary);
            border-color: transparent;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
        }

        .dev-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .dev-name {
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Chrome, Safari, Edge, Opera - Remove arrows */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>REFUND PRO</h1>
        <p>Premium Subscription Calculator</p>
    </div>

    <div class="input-wrapper">
        <label>Harga Pembelian</label>
        <input type="number" id="hargaBeli" placeholder="Rp 0" oninput="calculate()">
    </div>

    <div class="grid">
        <div class="input-wrapper">
            <label>Total Hari</label>
            <input type="number" id="totalDurasi" placeholder="30" oninput="calculate()">
        </div>
        <div class="input-wrapper">
            <label>Sisa Hari</label>
            <input type="number" id="sisaMasa" placeholder="0" oninput="calculate()">
        </div>
    </div>

    <div class="input-wrapper slider-box">
        <div class="slider-info">
            <label style="margin:0">Rate Refund</label>
            <span id="rateValue">0.80</span>
        </div>
        <input type="range" id="rateRefund" min="0.50" max="1.00" step="0.01" value="0.80" oninput="calculate()">
    </div>

    <div class="result-area">
        <span id="refundLabel">Estimasi Pengembalian</span>
        <h2 id="totalRefund">Rp 0</h2>
        <button class="copy-btn" onclick="copyResult()">Salin Hasil</button>
    </div>

    <footer>
        <div class="dev-tag">Developed by <span class="dev-name">Nerestore</span></div>
    </footer>
</div>

<script>
    function calculate() {
        const hargaBeli = parseFloat(document.getElementById('hargaBeli').value) || 0;
        const totalDurasi = parseFloat(document.getElementById('totalDurasi').value) || 0;
        const sisaMasa = parseFloat(document.getElementById('sisaMasa').value) || 0;
        const rateRefund = parseFloat(document.getElementById('rateRefund').value);
        
        document.getElementById('rateValue').innerText = rateRefund.toFixed(2);

        let refund = 0;
        if (totalDurasi > 0 && sisaMasa > 0) {
            const sisaValid = sisaMasa > totalDurasi ? totalDurasi : sisaMasa;
            refund = (sisaValid / totalDurasi) * hargaBeli * rateRefund;
        }

        const formatter = new Intl.NumberFormat('id-ID', {
            style: 'currency',
            currency: 'IDR',
            minimumFractionDigits: 0
        });

        document.getElementById('totalRefund').innerText = formatter.format(Math.floor(refund));
    }

    function copyResult() {
        const hasil = document.getElementById('totalRefund').innerText;
        const sisa = document.getElementById('sisaMasa').value;
        const text = `Estimasi Refund (${sisa} hari): ${hasil}\nProcessed by Nerestore`;
        
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.copy-btn');
            const originalText = btn.innerText;
            btn.innerText = 'Tersalin! ✅';
            btn.style.background = '#22c55e';
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = '';
            }, 2000);
        });
    }
</script>

</body>
</html>
