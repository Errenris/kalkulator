<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refund Pro | Nerestore Official</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #c084fc;
            --accent: #22d3ee;
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Background Decorations */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.25;
            animation: float 20s infinite alternate ease-in-out;
        }

        .blob-2 {
            bottom: -50px;
            right: -50px;
            background: var(--accent);
            width: 300px;
            height: 300px;
            animation-delay: -5s;
        }

        @keyframes float {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(15%, 15%); }
        }

        /* Glass Card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 4px;
        }

        /* Inputs */
        .field { margin-bottom: 1.25rem; }
        
        label {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            color: var(--text-dim);
        }

        input[type="number"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Slider */
        .slider-box {
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 18px;
            border: 1px solid var(--glass-border);
        }

        .slider-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        #rateValue {
            color: var(--accent);
            font-weight: 800;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
        }

        /* Result Area */
        .result-box {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(192, 132, 252, 0.1), rgba(34, 211, 238, 0.1));
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        #totalRefund {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 5px 0;
            color: #fff;
        }

        .btn-copy {
            margin-top: 12px;
            background: #fff;
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-copy:hover { transform: scale(1.02); }

        /* Stats */
        .stats {
            margin-top: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 0.65rem;
            color: var(--text-dim);
            background: rgba(255,255,255,0.03);
            padding: 8px 15px;
            border-radius: 100px;
            width: fit-content;
            margin-inline: auto;
        }

        .dot {
            width: 6px; height: 6px; background: #4ade80; border-radius: 50%;
            box-shadow: 0 0 8px #4ade80; animation: blink 1.5s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        footer {
            margin-top: 1.5rem;
            text-align: center;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
        }

        .brand {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--accent);
            text-transform: uppercase;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

<div class="blob"></div>
<div class="blob blob-2"></div>

<div class="card">
    <div class="header">
        <h1>REFUND PRO</h1>
        <p>Premium Subscription Calculator</p>
    </div>

    <div class="field">
        <label>Harga Produk (IDR)</label>
        <input type="number" id="hargaBeli" placeholder="Rp 0" oninput="calculate()">
    </div>

    <div class="grid">
        <div class="field">
            <label>Total Durasi</label>
            <input type="number" id="totalDurasi" placeholder="30 Hari" oninput="calculate()">
        </div>
        <div class="field">
            <label>Sisa Masa</label>
            <input type="number" id="sisaMasa" placeholder="0 Hari" oninput="calculate()">
        </div>
    </div>

    <div class="field slider-box">
        <div class="slider-info">
            <label style="margin:0">Rate Refund</label>
            <span id="rateValue">0.60</span>
        </div>
        <input type="range" id="rateRefund" min="0.50" max="1.00" step="0.01" value="0.60" oninput="calculate()">
    </div>

    <div class="result-box">
        <label style="margin-bottom: 2px;">Estimasi Refund</label>
        <h2 id="totalRefund">Rp 0</h2>
        <button class="btn-copy" onclick="copyResult()">SALIN DETAIL</button>
    </div>

    <div class="stats">
        <div class="dot"></div>
        <span>VISITOR: </span>
        <span id="visitorCount" style="color: #fff; font-weight: 800;">...</span>
    </div>

    <footer>
        <div class="brand">Engineered by Nerestore</div>
    </footer>
</div>

<script>
    // --- VISITOR COUNTER ---
    async function initCounter() {
        const countEl = document.getElementById('visitorCount');
        try {
            // Menggunakan CounterAPI.dev (Up)
            const res = await fetch('https://api.counterapi.dev/v1/nerestore_official/visits/up');
            const data = await res.json();
            countEl.innerText = data.count ? data.count.toLocaleString() : "LIVE";
        } catch (e) {
            countEl.innerText = "ONLINE";
        }
    }
    initCounter();

    // --- KALKULATOR ---
    function calculate() {
        const harga = parseFloat(document.getElementById('hargaBeli').value) || 0;
        const total = parseFloat(document.getElementById('totalDurasi').value) || 1;
        const sisa = parseFloat(document.getElementById('sisaMasa').value) || 0;
        const rate = parseFloat(document.getElementById('rateRefund').value);
        
        document.getElementById('rateValue').innerText = rate.toFixed(2);
        
        const sisaValid = sisa > total ? total : sisa;
        const hasil = (sisaValid / total) * harga * rate;

        const formatIDR = new Intl.NumberFormat('id-ID', {
            style: 'currency', currency: 'IDR', minimumFractionDigits: 0
        });
        document.getElementById('totalRefund').innerText = formatIDR.format(Math.floor(hasil));
    }

    // --- COPY DETAIL ---
    function copyResult() {
        const total = document.getElementById('totalRefund').innerText;
        const sisa = document.getElementById('sisaMasa').value || 0;
        const harga = document.getElementById('hargaBeli').value || 0;
        
        const teks = `📝 *DETAIL REFUND NERESTORE*\n\n` +
                     `• Harga Beli: Rp ${Number(harga).toLocaleString('id-ID')}\n` +
                     `• Sisa Durasi: ${sisa} Hari\n` +
                     `• Estimasi Refund: *${total}*\n\n` +
                     `_Processed by Nerestore Official_`;

        navigator.clipboard.writeText(teks).then(() => {
            const btn = document.querySelector('.btn-copy');
            const original = btn.innerText;
            btn.innerText = 'TERCOPY! ✅';
            btn.style.background = '#4ade80';
            setTimeout(() => {
                btn.innerText = original;
                btn.style.background = '#fff';
            }, 2000);
        });
    }
</script>

</body>
</html>
