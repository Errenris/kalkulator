<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Refund Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.75rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
        }

        input[type="number"] {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        /* Styling Slider */
        .slider-container {
            margin-top: 1rem;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        #rateValue {
            color: var(--primary);
            font-weight: bold;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Result Area */
        .result-card {
            margin-top: 2rem;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .result-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        #totalRefund {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Refund Pro</h2>
    <p class="subtitle">Hitung pengembalian dana langgananmu</p>
    
    <div class="input-group">
        <label>Harga Beli (IDR)</label>
        <input type="number" id="hargaBeli" placeholder="0" oninput="calculate()">
    </div>

    <div class="grid-2">
        <div class="input-group">
            <label>Total Durasi (Hari)</label>
            <input type="number" id="totalDurasi" placeholder="30" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Sisa Hari</label>
            <input type="number" id="sisaMasa" placeholder="0" oninput="calculate()">
        </div>
    </div>

    <div class="input-group slider-container">
        <div class="slider-header">
            <label>Rate Refund</label>
            <span id="rateValue">0.80</span>
        </div>
        <input type="range" id="rateRefund" min="0.50" max="1.00" step="0.01" value="0.80" oninput="calculate()">
    </div>

    <div class="result-card">
        <div class="result-title">Total Estimasi Refund</div>
        <div id="totalRefund">Rp 0</div>
    </div>

    <footer>
        Rumus: (Sisa/Total) × Harga × Rate
    </footer>
</div>

<script>
    function calculate() {
        // Ambil elemen
        const hargaBeli = parseFloat(document.getElementById('hargaBeli').value) || 0;
        const totalDurasi = parseFloat(document.getElementById('totalDurasi').value) || 0;
        const sisaMasa = parseFloat(document.getElementById('sisaMasa').value) || 0;
        const rateRefund = parseFloat(document.getElementById('rateRefund').value);
        
        // Update label rate di UI
        document.getElementById('rateValue').innerText = rateRefund.toFixed(2);

        let refund = 0;
        
        // Logika Hitung (Hanya jalan jika angka valid)
        if (totalDurasi > 0 && sisaMasa > 0) {
            // Kita batasi sisa masa tidak boleh lebih besar dari total durasi
            const sisaValid = sisaMasa > totalDurasi ? totalDurasi : sisaMasa;
            refund = (sisaValid / totalDurasi) * hargaBeli * rateRefund;
        }

        // Format Rupiah
        const formatter = new Intl.NumberFormat('id-ID', {
            style: 'currency',
            currency: 'IDR',
            minimumFractionDigits: 0
        });

        // Animasi angka (optional simple update)
        document.getElementById('totalRefund').innerText = formatter.format(refund);
    }
</script>

</body>
</html>
