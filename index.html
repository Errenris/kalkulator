<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refund Pro | Nerestore</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c084fc;
            --accent: #22d3ee;
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* Mencegah scroll dari blob dekorasi */
        }

        /* Dekorasi Background - Blobs */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .blob-2 {
            bottom: 10%;
            right: 10%;
            background: var(--accent);
            width: 250px;
            height: 250px;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.03em;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 4px;
            font-weight: 500;
        }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .input-wrapper {
            margin-bottom: 1.25rem;
        }

        input[type="number"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(192, 132, 252, 0.15);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .slider-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            margin-top: 5px;
        }

        .slider-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        #rateValue {
            color: var(--accent);
            font-weight: 800;
            font-size: 0.9rem;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
            transition: 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        /* Area Hasil */
        .result-card {
            margin-top: 2rem;
            padding: 1.8rem;
            background: linear-gradient(135deg, rgba(192, 132, 252, 0.1), rgba(34, 211, 238, 0.1));
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        #totalRefund {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .copy-btn {
            margin-top: 15px;
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            opacity: 0.6;
        }

        .dev-tag {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .dev-name {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.3);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="blob"></div>
<div class="blob blob-2"></div>

<div class="container">
    <div class="header">
        <h1>REFUND PRO</h1>
        <p>Premium Subscription Calculator</p>
    </div>

    <div class="input-wrapper">
        <label>Harga Pembelian</label>
        <input type="number" id="hargaBeli" placeholder="Rp 0" oninput="calculate()">
    </div>

    <div class="grid">
        <div class="input-wrapper">
            <label>Total Durasi</label>
            <input type="number" id="totalDurasi" placeholder="30 Hari" oninput="calculate()">
        </div>
        <div class="input-wrapper">
            <label>Sisa Masa</label>
            <input type="number" id="sisaMasa" placeholder="0 Hari" oninput="calculate()">
        </div>
    </div>

    <div class="slider-box">
        <div class="slider-info">
            <label style="margin:0">Rate Refund</label>
            <span id="rateValue">0.60</span>
        </div>
        <input type="range" id="rateRefund" min="0.50" max="1.00" step="0.01" value="0.60" oninput="calculate()">
    </div>

    <div class="result-card">
        <label style="margin-bottom: 5px;">Estimasi Refund</label>
        <h2 id="totalRefund">Rp 0</h2>
        <button class="copy-btn" onclick="copyResult()">Salin Hasil</button>
    </div>

    <footer>
        <div class="dev-tag">ENGINEERED BY <span class="dev-name">NERESTORE</span></div>
    </footer>
</div>

<script>
    function calculate() {
        const hargaBeli = parseFloat(document.getElementById('hargaBeli').value) || 0;
        const totalDurasi = parseFloat(document.getElementById('totalDurasi').value) || 0;
        const sisaMasa = parseFloat(document.getElementById('sisaMasa').value) || 0;
        const rateRefund = parseFloat(document.getElementById('rateRefund').value);
        
        document.getElementById('rateValue').innerText = rateRefund.toFixed(2);

        let refund = 0;
        if (totalDurasi > 0 && sisaMasa > 0) {
            const sisaValid = sisaMasa > totalDurasi ? totalDurasi : sisaMasa;
            refund = (sisaValid / totalDurasi) * hargaBeli * rateRefund;
        }

        const formatter = new Intl.NumberFormat('id-ID', {
            style: 'currency',
            currency: 'IDR',
            minimumFractionDigits: 0
        });

        document.getElementById('totalRefund').innerText = formatter.format(Math.floor(refund));
    }

    function copyResult() {
        const hasil = document.getElementById('totalRefund').innerText;
        const sisa = document.getElementById('sisaMasa').value || 0;
        const text = `Estimasi Refund (${sisa} hari): ${hasil}\nProcessed by Nerestore`;
        
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.copy-btn');
            const originalText = btn.innerText;
            btn.innerText = 'Copied to Clipboard! ✅';
            btn.style.background = '#22d3ee';
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = '#fff';
            }, 2000);
        });
    }
</script>

</body>
</html>
